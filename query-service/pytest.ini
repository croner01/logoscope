[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -q
    --tb=short
    --asyncio-mode=auto
    --cov=api
    --cov=storage
    --cov=main
    --cov-report=term-missing
    --cov-fail-under=30

markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
