# Production overrides for logoscope Helm chart.
# Usage:
# helm upgrade --install logoscope charts/logoscope \
#   -n islap --create-namespace \
#   -f charts/logoscope/values-prod.yaml

namespace:
  # 通常由 --create-namespace 或平台侧统一管理
  create: false

components:
  aiService:
    enabled: true
  clickhouse:
    enabled: true
  fluentBit:
    enabled: true
  frontend:
    enabled: true
  ingestService:
    enabled: true
  neo4j:
    enabled: true
  otelCollector:
    enabled: true
  otelGateway:
    enabled: true
  queryService:
    enabled: true
  redis:
    enabled: true
  semanticEngine:
    enabled: true
  semanticEngineWorker:
    enabled: true
  topologyService:
    enabled: true
  valueKpiCronjob:
    enabled: true

# 以 deploy/*.yaml 内原始镜像为 key，映射到生产要使用的固定镜像。
imageReplacements:
  localhost:5000/logoscope/ai-service:latest: localhost:5000/logoscope/ai-service:sqlopt-20260304-101504
  localhost:5000/logoscope/clickhouse-server:25.6: localhost:5000/logoscope/clickhouse-server:25.6
  localhost:5000/logoscope/fluent-bit:3.1.3: localhost:5000/logoscope/fluent-bit:3.1.3
  localhost:5000/logoscope/frontend:latest: localhost:5000/logoscope/frontend:20260304-spanfix2
  localhost:5000/logoscope/ingest-service:latest: localhost:5000/logoscope/ingest-service:sqlopt-20260304-101504
  localhost:5000/logoscope/neo4j:4.4-community: localhost:5000/logoscope/neo4j:4.4-community
  localhost:5000/logoscope/opentelemetry-collector:0.111.0: otel/opentelemetry-collector-contrib:0.91.0
  localhost:5000/logoscope/query-service:latest: localhost:5000/logoscope/query-service:20260304-spanfix3
  localhost:5000/logoscope/semantic-engine:latest: localhost:5000/logoscope/semantic-engine:20260304-spanfix3
  localhost:5000/logoscope/topology-service:latest: localhost:5000/logoscope/topology-service:20260304-cstfix
