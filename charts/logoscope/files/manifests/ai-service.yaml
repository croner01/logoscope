apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: islap
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
  - port: 8090
    name: http
    protocol: TCP
    targetPort: 8090
  selector:
    app: ai-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: islap
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: localhost:5000/logoscope/ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP
        env:
        - name: APP_NAME
          value: "ai-service"
        - name: APP_VERSION
          value: "1.0.0"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8090"
        - name: DEBUG
          value: "false"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONPATH
          value: "/app/shared_lib"
        - name: TZ
          value: "UTC"
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_PORT
          value: "9000"
        - name: CLICKHOUSE_DATABASE
          value: "logs"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          value: ""
        - name: NEO4J_HOST
          value: "neo4j"
        - name: NEO4J_PORT
          value: "7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "password"
        - name: NEO4J_DATABASE
          value: "neo4j"
        - name: LOG_LEVEL
          value: "info"
        - name: OTEL_PYTHON_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "ai-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=ai-service,deployment.environment=production"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.islap.svc.cluster.local:4318"
        - name: AI_AGENT_QUERY_API_BASE
          value: "http://query-service:8002"
        - name: AI_AGENT_QUERY_API_TIMEOUT_SECONDS
          value: "6"
        - name: EXEC_SERVICE_BASE_URL
          value: "http://exec-service:8095"
        - name: LLM_PROVIDER
          value: "deepseek"
        - name: LLM_API_BASE
          value: ""
        - name: LOCAL_MODEL_API_BASE
          value: ""
        - name: LOCAL_MODEL_PATH
          value: ""
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: LLM_API_KEY
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: ANTHROPIC_API_KEY
              optional: true
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: DEEPSEEK_API_KEY
              optional: true
        - name: LOCAL_MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: LOCAL_MODEL_API_KEY
              optional: true
        - name: LLM_MODEL
          value: "deepseek-chat"
        - name: AI_FOLLOWUP_ENGINE
          value: "langchain"
        - name: AI_FOLLOWUP_LONG_TERM_MEMORY_ENABLED
          value: "true"
        - name: AI_FOLLOWUP_LONG_TERM_MEMORY_SESSION_LIMIT
          value: "6"
        - name: AI_FOLLOWUP_LONG_TERM_MEMORY_MAX_SNIPPETS
          value: "6"
        - name: AI_FOLLOWUP_LONG_TERM_MEMORY_MESSAGE_LIMIT
          value: "4"
        - name: AI_FOLLOWUP_WEB_SEARCH_ENABLED
          value: "false"
        - name: AI_FOLLOWUP_WEB_SEARCH_ENDPOINT
          value: ""
        - name: AI_FOLLOWUP_WEB_SEARCH_TIMEOUT_SECONDS
          value: "6"
        - name: AI_FOLLOWUP_LLM_TIMEOUT_SECONDS
          value: "90"
        - name: AI_FOLLOWUP_COMMAND_EXEC_ENABLED
          value: "true"
        - name: AI_FOLLOWUP_COMMAND_WRITE_ENABLED
          value: "true"
        - name: AI_FOLLOWUP_COMMAND_TEST_PERMISSIVE
          value: "false"
        - name: AI_RUNTIME_V1_API_ENABLED
          value: "false"
        - name: AI_RUNTIME_V4_OUTER_ENGINE
          value: "temporal_required"
        - name: AI_RUNTIME_V4_INNER_ENGINE
          value: "langgraph_required"
        - name: AI_RUNTIME_V4_TEMPORAL_ADDRESS
          value: "temporal-frontend:7233"
        - name: AI_RUNTIME_V4_TEMPORAL_NAMESPACE
          value: "default"
        - name: AI_RUNTIME_V4_TEMPORAL_TASK_QUEUE
          value: "ai-runtime-v4"
        - name: AI_RUNTIME_V4_TEMPORAL_WORKER_ENABLED
          value: "true"
        - name: AI_RUNTIME_V4_TEMPORAL_CONNECT_TIMEOUT_SECONDS
          value: "5"
        - name: AI_RUNTIME_V4_TEMPORAL_WORKFLOW_TIMEOUT_SECONDS
          value: "3600"
        - name: AI_RUNTIME_V4_TEMPORAL_QUERY_ATTEMPTS
          value: "15"
        - name: AI_RUNTIME_V4_TEMPORAL_QUERY_INTERVAL_MS
          value: "200"
        - name: AI_RUNTIME_V4_GRAPH_CHECKPOINT_TABLE
          value: "logs.ai_runtime_v4_graph_checkpoints"
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 300m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
