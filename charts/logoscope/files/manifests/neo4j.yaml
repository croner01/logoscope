apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: islap
  labels:
    app: neo4j
spec:
  type: ClusterIP
  ports:
  - port: 7474
    name: http
    protocol: TCP
    targetPort: 7474
  - port: 7687
    name: bolt
    protocol: TCP
    targetPort: 7687
  selector:
    app: neo4j
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
  namespace: islap
spec:
  storageClassName: standard
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: islap
  labels:
    app: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: localhost:5000/logoscope/neo4j:4.4-community
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7474
          name: http
          protocol: TCP
        - containerPort: 7687
          name: bolt
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        - name: logs
          mountPath: /logs
        - name: import
          mountPath: /var/lib/neo4j/import
        - name: plugins
          mountPath: /plugins
        env:
        - name: NEO4J_AUTH
          value: "neo4j/password"
        - name: NEO4J_dbms_memory_heap_initial__size
          value: "512m"
        - name: NEO4J_dbms_memory_heap_max__size
          value: "1G"
        - name: NEO4J_dbms_memory_pagecache_size
          value: "512m"
        - name: NEO4J_server_config_strict_validation_enabled
          value: "false"
        - name: NEO4J_dbms_connector_http_listen__address
          value: "0.0.0.0:7474"
        - name: NEO4J_dbms_connector_http_advertised__address
          value: "0.0.0.0:7474"
        - name: NEO4J_dbms_connector_bolt_listen__address
          value: "0.0.0.0:7687"
        - name: NEO4J_dbms_connector_bolt_advertised__address
          value: "0.0.0.0:7687"
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: neo4j-pvc
      - name: logs
        emptyDir: {}
      - name: import
        emptyDir: {}
      - name: plugins
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neo4j-init
  namespace: islap
  labels:
    app: neo4j
data:
  init.cypher: |
    -- 创建唯一约束
    CREATE CONSTRAINT service_id_unique IF NOT EXISTS
    FOR (s:Service) REQUIRE s.id IS UNIQUE;

    -- 创建索引
    CREATE INDEX service_name_idx IF NOT EXISTS
    FOR (s:Service) ON (s.name);

    CREATE INDEX service_type_idx IF NOT EXISTS
    FOR (s:Service) ON (s.type);

    CREATE INDEX service_namespace_idx IF NOT EXISTS
    FOR (s:Service) ON (s.namespace);
