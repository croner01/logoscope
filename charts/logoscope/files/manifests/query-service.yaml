apiVersion: v1
kind: Service
metadata:
  name: query-service
  namespace: islap
  labels:
    app: query-service
spec:
  type: ClusterIP
  ports:
  - port: 8002
    name: http
    protocol: TCP
    targetPort: 8002
  selector:
    app: query-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: islap
  labels:
    app: query-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
      - name: query-service
        image: localhost:5000/logoscope/query-service:20260324-fe08fix1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
          name: http
          protocol: TCP
        env:
        - name: APP_NAME
          value: "query-service"
        - name: APP_VERSION
          value: "1.0.0"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8002"
        - name: DEBUG
          value: "false"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONPATH
          value: "/app/shared_lib"
        - name: TZ
          value: "UTC"
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_PORT
          value: "9000"
        - name: CLICKHOUSE_DATABASE
          value: "logs"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          value: ""
        - name: NEO4J_HOST
          value: "neo4j"
        - name: NEO4J_PORT
          value: "7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "password"
        - name: NEO4J_DATABASE
          value: "neo4j"
        - name: LOG_LEVEL
          value: "info"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "query-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=query-service,deployment.environment=production"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.islap.svc.cluster.local:4318"
        - name: PREAGG_SCHEMA_VERSION
          value: "v2"
        - name: QUERY_LOGS_DEFAULT_TIME_WINDOW
          value: "1 HOUR"
        - name: QUERY_LOGS_MAX_THREADS
          value: "4"
        - name: QUERY_LOGS_HARD_MAX_WINDOW_MINUTES
          value: "10080"
        - name: QUERY_LOGS_FACETS_DEGRADE_WINDOW_MINUTES
          value: "10080"
        resources:
          limits:
            cpu: "2"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 2
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: query-service-hpa
  namespace: islap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: query-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
