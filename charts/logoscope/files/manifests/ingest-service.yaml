apiVersion: v1
kind: Service
metadata:
  name: ingest-service
  namespace: islap
  labels:
    app: ingest-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: http
    protocol: TCP
    targetPort: 8080
  selector:
    app: ingest-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-service
  namespace: islap
  labels:
    app: ingest-service
spec:
  replicas: 1  # 降低副本数以节省资源
  selector:
    matchLabels:
      app: ingest-service
  template:
    metadata:
      labels:
        app: ingest-service
    spec:
      containers:
      - name: ingest-service
        image: localhost:5000/logoscope/ingest-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # 应用配置
        - name: APP_NAME
          value: "ingest-service"
        - name: APP_VERSION
          value: "1.0.0"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: DEBUG
          value: "false"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONPATH
          value: "/app/shared_lib"
        - name: TZ
          value: "UTC"
        # Redis 配置（队列写入）
        - name: REDIS_HOST
          value: "redis"  # 使用 Service名
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_DB
          value: "0"
        - name: REDIS_STREAM
          value: "logs.raw"
        - name: REDIS_STREAM_LOGS
          value: "logs.raw"
        - name: REDIS_STREAM_METRICS
          value: "metrics.raw"
        - name: REDIS_STREAM_TRACES
          value: "traces.raw"
        # 处理配置
        - name: BATCH_SIZE
          value: "100"
        - name: BATCH_TIMEOUT
          value: "5"
        - name: LOG_LEVEL
          value: "info"
        # 内存队列配置（降级方案）
        - name: MEMORY_QUEUE_MAX_SIZE
          value: "1000"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      # 重启策略
      restartPolicy: Always
