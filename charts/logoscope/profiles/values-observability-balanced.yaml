# Observability profile: Balanced throughput/reliability
#
# Usage:
# helm upgrade --install logoscope charts/logoscope \
#   -n islap --create-namespace \
#   -f charts/logoscope/values.yaml \
#   -f charts/logoscope/profiles/values-observability-balanced.yaml
#
# Notes:
# - This profile keeps reliability guardrails while tuning for higher throughput.

components:
  ingestService:
    hpa:
      minReplicas: 3
      maxReplicas: 12
    env:
      MEMORY_QUEUE_MAX_SIZE: "12000"
      QUEUE_LOG_RECORD_BATCH_SIZE: "200"
      BATCH_SIZE: "120"
      BATCH_TIMEOUT: "5"
      MEMORY_QUEUE_DROP_OLDEST_WHEN_FULL: "false"

  semanticEngine:
    hpa:
      minReplicas: 2
      maxReplicas: 8
    env:
      CH_BATCH_SIZE: "2500"
      CH_FLUSH_INTERVAL: "0.5"
      CH_BATCH_ASYNC_INSERT: "true"
      CH_BATCH_WAIT_FOR_ASYNC_INSERT: "true"
      DLQ_ENABLED: "true"

  semanticEngineWorker:
    hpa:
      minReplicas: 3
      maxReplicas: 16
    env:
      DLQ_ENABLED: "true"
      DLQ_MAX_RETRIES: "3"
      CH_BATCH_SIZE: "3000"
      CH_FLUSH_INTERVAL: "0.35"
      CH_BATCH_ASYNC_INSERT: "true"
      CH_BATCH_WAIT_FOR_ASYNC_INSERT: "true"
      CH_BATCH_LOG_EVERY: "20"
