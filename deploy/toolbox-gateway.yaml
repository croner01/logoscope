apiVersion: v1
kind: ServiceAccount
metadata:
  name: toolbox-gateway
  namespace: islap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: toolbox-gateway-k8s
  namespace: islap
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: toolbox-gateway-k8s
  namespace: islap
subjects:
  - kind: ServiceAccount
    name: toolbox-gateway
    namespace: islap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: toolbox-gateway-k8s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toolbox-gateway
  namespace: islap
  labels:
    app: toolbox-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toolbox-gateway
  template:
    metadata:
      labels:
        app: toolbox-gateway
    spec:
      serviceAccountName: toolbox-gateway
      containers:
        - name: toolbox-gateway
          image: localhost:5000/logoscope/toolbox-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
          env:
            - name: TOOLBOX_GATEWAY_ALLOWED_HEADS
              value: "kubectl,clickhouse-client,clickhouse"
            - name: TOOLBOX_GATEWAY_DEFAULT_TIMEOUT_SECONDS
              value: "90"
            - name: TOOLBOX_GATEWAY_MAX_OUTPUT_BYTES
              value: "262144"
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: toolbox-gateway
  namespace: islap
  labels:
    app: toolbox-gateway
spec:
  selector:
    app: toolbox-gateway
  ports:
    - name: http
      port: 8088
      targetPort: 8088
