apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-config
  namespace: islap
  labels:
    app: ai-service
data:
  APP_NAME: "ai-service"
  APP_VERSION: "1.0.0"
  HOST: "0.0.0.0"
  PORT: "8090"
  DEBUG: "false"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONFAULTHANDLER: "1"
  PYTHONPATH: "/app/shared_lib"
  TZ: "UTC"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_DATABASE: "logs"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: ""
  NEO4J_HOST: "neo4j"
  NEO4J_PORT: "7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "password"
  NEO4J_DATABASE: "neo4j"
  LOG_LEVEL: "info"
  OTEL_PYTHON_AUTO_INSTRUMENTATION_ENABLED: "true"
  OTEL_SERVICE_NAME: "ai-service"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=ai-service,deployment.environment=production"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.islap.svc.cluster.local:4318"
  AI_AGENT_QUERY_API_BASE: "http://query-service:8002"
  AI_AGENT_QUERY_API_TIMEOUT_SECONDS: "6"
  EXEC_SERVICE_BASE_URL: "http://exec-service:8095"
  QUERY_SERVICE_BASE_URL: "http://query-service:8002"
  AI_RUNTIME_UNIFIED_ENGINE_ENABLED: "true"
  AI_RUNTIME_SESSION_COMMAND_LIMIT: "10"
  LLM_PROVIDER: "deepseek"
  LLM_API_BASE: ""
  LOCAL_MODEL_API_BASE: ""
  LOCAL_MODEL_PATH: ""
  LLM_MODEL: "deepseek-v4-flash"
  LLM_MAX_TOKENS: "8192"
    #AI_FOLLOWUP_ENGINE: "langchain"
    #AI_FOLLOWUP_LONG_TERM_MEMORY_ENABLED: "true"
    #AI_FOLLOWUP_LONG_TERM_MEMORY_SESSION_LIMIT: "6"
    #AI_FOLLOWUP_LONG_TERM_MEMORY_MAX_SNIPPETS: "6"
    #AI_FOLLOWUP_LONG_TERM_MEMORY_MESSAGE_LIMIT: "4"
    #AI_FOLLOWUP_WEB_SEARCH_ENABLED: "true"
    #AI_FOLLOWUP_WEB_SEARCH_ENDPOINT: ""
    #AI_FOLLOWUP_WEB_SEARCH_TIMEOUT_SECONDS: "20"
    #AI_FOLLOWUP_LLM_TOTAL_TIMEOUT_SECONDS: "160"
    #AI_FOLLOWUP_LLM_FIRST_TOKEN_TIMEOUT_SECONDS: "45"
    #AI_FOLLOWUP_COMMAND_EXEC_ENABLED: "true"
    #AI_FOLLOWUP_COMMAND_WRITE_ENABLED: "true"
    #AI_FOLLOWUP_COMMAND_TEST_PERMISSIVE: "false"
  AI_FOLLOWUP_WEB_SEARCH_ENABLED: "true"
  AI_RUNTIME_V1_API_ENABLED: "false"
  AI_RUNTIME_V4_OUTER_ENGINE: "temporal_required"
  AI_RUNTIME_V4_INNER_ENGINE: "langgraph_required"
  AI_RUNTIME_V4_AGENT_BACKEND: "openhands"
  AI_RUNTIME_V4_OPENHANDS_ENABLED: "true"
  AI_RUNTIME_V4_OPENHANDS_HELPER_ENABLED: "true"
  AI_RUNTIME_V4_OPENHANDS_HELPER_PYTHON: "/opt/openharness-venv/bin/python"
  AI_RUNTIME_V4_OPENHANDS_HELPER_SCRIPT: "/app/ai/runtime_v4/backend/openhands_helper.py"
  AI_RUNTIME_V4_OPENHANDS_HELPER_TIMEOUT_SECONDS: "90"
  AI_RUNTIME_V4_OPENHANDS_MODEL: "deepseek-v4-flash"
  AI_RUNTIME_V4_OPENHANDS_BASE_URL: "https://api.deepseek.com/v1"
  AI_RUNTIME_V4_TEMPORAL_ADDRESS: "temporal-frontend:7233"
  AI_RUNTIME_V4_TEMPORAL_NAMESPACE: "default"
  AI_RUNTIME_V4_TEMPORAL_TASK_QUEUE: "ai-runtime-v4"
  AI_RUNTIME_V4_TEMPORAL_WORKER_ENABLED: "true"
  AI_RUNTIME_V4_TEMPORAL_CONNECT_TIMEOUT_SECONDS: "5"
  AI_RUNTIME_V4_TEMPORAL_WORKFLOW_TIMEOUT_SECONDS: "3600"
  AI_RUNTIME_V4_TEMPORAL_QUERY_ATTEMPTS: "15"
  AI_RUNTIME_V4_TEMPORAL_QUERY_INTERVAL_MS: "200"
  AI_RUNTIME_V4_GRAPH_CHECKPOINT_TABLE: "logs.ai_runtime_v4_graph_checkpoints"
  AI_RUNTIME_V4_REMOTE_TARGETS_JSON: '[{"target_kind":"k8s_cluster","target_identity":"namespace:openstack-cluster-01","display_name":"OpenStack K8s Cluster","description":"OpenStack-provisioned Kubernetes cluster","metadata":{"cluster_id":"openstack-cluster-01","risk_tier":"high","preferred_executor_profiles":["toolbox-k8s-readonly","toolbox-k8s-mutating"]},"capabilities":["read_logs","restart_workload","helm_read","helm_mutation"],"credential_scope":{"kubeconfig_name":"openstack-cluster-01"}},{"target_kind":"host_node","target_identity":"host:node-3","display_name":"OpenStack Node-3","description":"OpenStack compute node node-3","metadata":{"cluster_id":"openstack-cluster-01","node_name":"node-3","risk_tier":"high","preferred_executor_profiles":["host-ssh-readonly","host-ssh-mutating"]},"capabilities":["read_host_state","host_mutation"],"credential_scope":{"ssh_host":"node-3"}}]'
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: islap
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
  - port: 8090
    name: http
    protocol: TCP
    targetPort: 8090
  selector:
    app: ai-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service
  namespace: islap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-service-pod-reader
  namespace: islap
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-service-pod-reader
  namespace: islap
subjects:
  - kind: ServiceAccount
    name: ai-service
    namespace: islap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-service-pod-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: islap
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      serviceAccountName: ai-service
      containers:
      - name: ai-service
        image: localhost:5000/logoscope/ai-service:20260605-2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          name: http
          protocol: TCP
        env:
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: LLM_API_KEY
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: ANTHROPIC_API_KEY
              optional: true
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: DEEPSEEK_API_KEY
              optional: true
        - name: LOCAL_MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: semantic-engine-llm
              key: LOCAL_MODEL_API_KEY
              optional: true
        envFrom:
        - configMapRef:
            name: ai-service-config
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 300m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
