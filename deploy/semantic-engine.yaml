apiVersion: v1
kind: Service
metadata:
  name: semantic-engine
  namespace: islap
  labels:
    app: semantic-engine
spec:
  type: ClusterIP
  ports:
  - port: 8080
    name: http
    protocol: TCP
    targetPort: 8080
  selector:
    app: semantic-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-engine
  namespace: islap
  labels:
    app: semantic-engine
spec:
  replicas: 1  # 降低副本数以节省资源
  selector:
    matchLabels:
      app: semantic-engine
  template:
    metadata:
      labels:
        app: semantic-engine
    spec:
      containers:
      - name: semantic-engine
        image: localhost:5000/logoscope/semantic-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: APP_NAME
          value: "semantic-engine"
        - name: APP_VERSION
          value: "1.0.0"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: DEBUG
          value: "false"
        - name: PYTHONDONTWRITEBYTECODE
          value: "1"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONFAULTHANDLER
          value: "1"
        - name: PYTHONPATH
          value: "/app/shared_lib"
        - name: TZ
          value: "UTC"
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_PORT
          value: "9000"
        - name: CLICKHOUSE_DATABASE
          value: "logs"
        - name: CLICKHOUSE_USER
          value: "default"
        - name: CLICKHOUSE_PASSWORD
          value: ""
        - name: NEO4J_HOST
          value: "neo4j"
        - name: NEO4J_PORT
          value: "7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "password"
        - name: NEO4J_DATABASE
          value: "neo4j"
        - name: PROCESS_BATCH_SIZE
          value: "10"
        - name: PROCESS_TIMEOUT
          value: "30"
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_PSEUDO_TRACE_ID_FALLBACK
          value: "false"
        # 队列配置
        - name: USE_QUEUE
          value: "true"  # 启用队列模式
        - name: QUEUE_TYPE
          value: "redis"  # 使用Redis Stream
        # Redis配置
        - name: REDIS_HOST
          value: "redis"  # 使用Service名
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_DB
          value: "0"
        # 批量处理配置 (P0 优化)
        - name: REDIS_BATCH_SIZE
          value: "100"
        - name: REDIS_BLOCK_MS
          value: "100"
        - name: CH_BATCH_SIZE
          value: "2000"
        - name: CH_FLUSH_INTERVAL
          value: "0.5"
        - name: DLQ_ENABLED
          value: "true"
        # OpenTelemetry 分布式追踪配置
        - name: OTEL_PYTHON_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "semantic-engine"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=semantic-engine,deployment.environment=production"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.islap.svc.cluster.local:4318"
        - name: AI_SERVICE_BASE_URL
          value: "http://ai-service:8090"
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
