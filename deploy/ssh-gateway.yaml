apiVersion: v1
kind: ServiceAccount
metadata:
  name: ssh-gateway
  namespace: islap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-gateway
  namespace: islap
  labels:
    app: ssh-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-gateway
  template:
    metadata:
      labels:
        app: ssh-gateway
    spec:
      serviceAccountName: ssh-gateway
      containers:
        - name: ssh-gateway
          image: localhost:5000/logoscope/ssh-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8096
          env:
            - name: SSH_GATEWAY_DEFAULT_TIMEOUT_SECONDS
              value: "60"
            - name: SSH_GATEWAY_MAX_OUTPUT_BYTES
              value: "262144"
            - name: SSH_GATEWAY_HOSTS_CONFIG
              value: "/etc/ssh-hosts/config.yaml"
          volumeMounts:
            - name: ssh-hosts-config
              mountPath: /etc/ssh-hosts
              readOnly: true
            - name: ssh-key-node-3
              mountPath: /etc/ssh-keys/node-3
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: ssh-hosts-config
          configMap:
            name: ssh-hosts-config
        - name: ssh-key-node-3
          secret:
            secretName: ssh-key-node-3
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-gateway
  namespace: islap
  labels:
    app: ssh-gateway
spec:
  selector:
    app: ssh-gateway
  ports:
    - name: http
      port: 8096
      targetPort: 8096
