# Deploy profile: Test (accuracy-first)
#
# Scope:
# - Sync baseline for raw deploy manifests under deploy/
# - Keep collection range unchanged (Fluent Bit untouched)
#
# Recommended usage:
# 1) Use this in test/staging for data-accuracy verification.
# 2) Sync keys into these manifests when needed:
#    - deploy/ingest-service.yaml
#    - deploy/semantic-engine.yaml
#    - deploy/semantic-engine-worker.yaml

components:
  ingestService:
    hpa:
      minReplicas: 4
      maxReplicas: 14
    env:
      MEMORY_QUEUE_MAX_SIZE: "40000"
      QUEUE_LOG_RECORD_BATCH_SIZE: "120"
      BATCH_SIZE: "80"
      BATCH_TIMEOUT: "3"
      MEMORY_QUEUE_DROP_OLDEST_WHEN_FULL: "false"

  semanticEngine:
    hpa:
      minReplicas: 3
      maxReplicas: 10
    env:
      CH_BATCH_SIZE: "1000"
      CH_FLUSH_INTERVAL: "0.2"
      CH_BATCH_ASYNC_INSERT: "true"
      CH_BATCH_WAIT_FOR_ASYNC_INSERT: "true"
      DLQ_ENABLED: "true"

  semanticEngineWorker:
    hpa:
      minReplicas: 4
      maxReplicas: 20
    env:
      DLQ_ENABLED: "true"
      DLQ_MAX_RETRIES: "5"
      CH_BATCH_SIZE: "1200"
      CH_FLUSH_INTERVAL: "0.2"
      CH_BATCH_ASYNC_INSERT: "true"
      CH_BATCH_WAIT_FOR_ASYNC_INSERT: "true"
      CH_BATCH_LOG_EVERY: "20"
