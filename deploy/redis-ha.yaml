apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: islap
  labels:
    app: redis
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: islap
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    app: redis
    statefulset.kubernetes.io/pod-name: redis-0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: islap
  labels:
    app: redis
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no

    # 持久化与一致性
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    stop-writes-on-bgsave-error no

    # 大规模接入场景提高内存上限，降低 Stream backlog 顶满概率
    maxmemory 3072mb
    maxmemory-policy noeviction

    # 复制与网络
    repl-diskless-sync yes
    repl-diskless-sync-delay 5
    repl-backlog-size 256mb
    timeout 0
    tcp-keepalive 60

    # 安全与日志
    loglevel notice
    dir /data
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: islap
  labels:
    app: redis
spec:
  serviceName: redis-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-ec"]
        args:
          - |
            ordinal="${HOSTNAME##*-}"
            master_host="redis-0.redis-headless.${POD_NAMESPACE}.svc.cluster.local"
            cp /conf/redis.conf /tmp/redis.conf
            if [ "$ordinal" = "0" ]; then
              echo "replica-read-only no" >> /tmp/redis.conf
              exec redis-server /tmp/redis.conf
            fi

            # 等待主节点可达再启动副本，避免重复重启
            for i in $(seq 1 90); do
              if redis-cli -h "$master_host" -p 6379 ping >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            echo "replicaof $master_host 6379" >> /tmp/redis.conf
            echo "replica-read-only yes" >> /tmp/redis.conf
            exec redis-server /tmp/redis.conf
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        startupProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 60
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 6
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /conf
          readOnly: true
      volumes:
      - name: redis-config
        configMap:
          name: redis-config
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 20Gi
