[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -q
    --strict-markers
    --tb=short
    --cov=api
    --cov=ai
    --cov=storage
    --cov=main
    --cov=config
    --cov-report=term-missing
    --cov-fail-under=30
markers =
    unit: unit tests
    integration: integration tests
pythonpath = .
