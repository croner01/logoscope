name: network_connectivity
display_name: 网络连通性检测
description: 检测服务间网络连通性：curl 健康检查端点、kubectl exec nslookup DNS 解析、kubectl get endpoints
  确认 Pod 就绪状态。适用于连接拒绝、超时、DNS 不通等网络类故障。
applicable_components:
- network
- service
- endpoint
- dns
- pod
- ingress
trigger_patterns:
- connection refused
- ECONNREFUSED
- connection.*timeout
- \bDNS\b.*fail
- NXDOMAIN
- unreachable
- no route to host
- network.*fail
- connect.*fail
risk_level: low
max_steps: 3
steps:
- id: net-health-check
  title: curl 服务健康端点
  tool: generic_exec
  command: curl -sS --max-time 5 http://{service_name}.{namespace}.svc.cluster.local/health
  purpose: 验证目标服务 HTTP 健康端点是否可达，检测 4xx/5xx 响应
  timeout: 15
  parse_hints:
    extract:
    - HTTP
    - status
    - healthy
    - error
    - refused
- id: net-dns-resolve
  title: DNS 解析验证
  tool: generic_exec
  command: kubectl exec -n {namespace} deploy/{service_name} -- nslookup {service_name}.{namespace}.svc.cluster.local
    2>/dev/null
  purpose: 确认 Kubernetes DNS 解析是否正常
  timeout: 15
  depends_on:
  - net-health-check
  parse_hints:
    extract:
    - Address
    - NXDOMAIN
    - server
    - failed
- id: net-k8s-endpoints
  title: 检查 Service Endpoints
  tool: generic_exec
  command: kubectl get endpoints -n {namespace} {service_name} -o wide
  purpose: 确认 Service 是否有健康的 Endpoint，排除 Pod 未就绪问题
  timeout: 10
  depends_on:
  - net-health-check
  parse_hints:
    extract:
    - ENDPOINTS
    - none
    - NotReady
