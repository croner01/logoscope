name: resource_usage
display_name: 资源用量分析
description: 分析 Kubernetes 集群和 Pod 的 CPU/内存资源用量：kubectl top nodes、kubectl top pods
  排序、resource quota 检查。适用于 OOM、CPU throttling、Pod Eviction 等资源类故障。
applicable_components:
- pod
- node
- deployment
- resource
- memory
- cpu
trigger_patterns:
- \bOOM\b
- OOMKilled
- memory.*limit
- CPU.*throttl
- resource.*limit
- \bevict
- out of memory
- Insufficient
risk_level: low
max_steps: 3
steps:
- id: res-top-nodes
  title: 查看节点资源用量
  tool: generic_exec
  command: kubectl top nodes --no-headers
  purpose: 了解集群节点整体资源压力，判断是否存在节点级别的资源瓶颈
  timeout: 15
  parse_hints:
    extract:
    - CPU
    - MEMORY
    - '%'
    - Mi
    - Gi
- id: res-top-pods
  title: 查看各命名空间 Pod 资源用量排序
  tool: generic_exec
  command: kubectl top pod -A --no-headers
  purpose: 找出内存用量最高的 Pod，定位资源占用异常的进程
  timeout: 15
  depends_on:
  - res-top-nodes
  parse_hints:
    extract:
    - CPU
    - MEMORY
    - Mi
    - Gi
    - '{service_name}'
- id: res-quota-check
  title: 检查各命名空间 ResourceQuota
  tool: generic_exec
  command: kubectl get resourcequota -A --no-headers
  purpose: 确认命名空间资源配额是否已满，是否存在 requests / limits 约束压力
  timeout: 15
  depends_on:
  - res-top-nodes
  parse_hints:
    extract:
    - Used
    - Hard
    - requests
    - limits
    - memory
    - cpu
