name: clickhouse_log_query
display_name: ClickHouse 日志深查
description: 通过 ClickHouse SQL 对日志进行深度分析：统计错误频率、查询指定时间窗口内的异常明细、聚合错误模式，适用于大批量日志中定位高频错误和慢操作。
applicable_components:
- clickhouse
- database
- log
- query
trigger_patterns:
- \bclickhouse\b
- clickhouse.*error
- clickhouse.*timeout
- slow.*query
- query.*fail
- db.*error
- sql.*exception
risk_level: low
max_steps: 3
steps:
- id: ch-error-count
  title: 统计近 1 小时各级别日志数量
  tool: kubectl_clickhouse_query
  command: SELECT level, count() AS cnt FROM logs.events WHERE timestamp >= now()
    - INTERVAL 1 HOUR AND service_name = '{service_name}' GROUP BY level ORDER BY
    cnt DESC LIMIT 10 FORMAT PrettyCompact
  purpose: 快速定位错误日志级别分布，判断故障严重程度
  timeout: 45
  parse_hints:
    extract:
    - ERROR
    - WARN
    - count
- id: ch-error-detail
  title: 查询近 30 分钟错误日志明细
  tool: kubectl_clickhouse_query
  command: SELECT timestamp, service_name, level, message FROM logs.events WHERE timestamp
    >= now() - INTERVAL 30 MINUTE AND level IN ('ERROR','WARN','FATAL') AND service_name
    = '{service_name}' ORDER BY timestamp DESC LIMIT 30 FORMAT PrettyCompact
  purpose: 获取具体错误消息和发生时序，定位根因时间点
  timeout: 45
  depends_on:
  - ch-error-count
  parse_hints:
    extract:
    - message
    - timestamp
    - level
- id: ch-error-pattern
  title: 聚合错误消息模式
  tool: kubectl_clickhouse_query
  command: SELECT   replaceRegexpAll(message, '\\d+', '?') AS msg_pattern,   count()
    AS cnt FROM logs.events WHERE timestamp >= now() - INTERVAL 1 HOUR AND level =
    'ERROR' AND service_name = '{service_name}' GROUP BY msg_pattern ORDER BY cnt
    DESC LIMIT 10 FORMAT PrettyCompact
  purpose: 将相似错误归类，找出最高频错误模式
  timeout: 45
  depends_on:
  - ch-error-count
  parse_hints:
    extract:
    - pattern
    - count
    - msg_pattern
